# github-actions/.github/workflows/cd.yml
# Deployment pipeline — triggers on push to main branch only

name: CD — Build, Push & Deploy

on:
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: sample-app
  DOCKER_REGISTRY: dtighiltferhat
  AWS_REGION: us-east-1
  S3_BUCKET: dtf-cicd-artifacts

jobs:

  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run all tests
        run: pytest app/tests/ -v --junitxml=reports/all-tests.xml

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: reports/all-tests.xml

  build-and-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag from Git SHA
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.APP_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.APP_NAME }}:latest

      - name: Upload build manifest to S3
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Push manifest to S3
        run: |
          echo "${{ steps.meta.outputs.tag }}" > build-manifest.txt
          aws s3 cp build-manifest.txt \
            s3://${{ env.S3_BUCKET }}/builds/${{ env.APP_NAME }}/${{ steps.meta.outputs.tag }}/build-manifest.txt

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to environment
        run: |
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh ${{ needs.build-and-push.outputs.image_tag }}

      - name: Smoke test
        run: |
          sleep 15
          pip install requests pytest
          pytest app/tests/smoke/ -v
