# github-actions/.github/workflows/ci.yml
# PR validation pipeline — runs on every pull request

name: CI — Pull Request Validation

on:
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: sample-app

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install flake8 black
          pip install -r app/requirements.txt

      - name: Run flake8
        run: flake8 app/src/ --max-line-length=120

      - name: Check formatting with black
        run: black --check app/src/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run unit tests
        run: pytest app/tests/unit/ -v --junitxml=reports/unit-tests.xml

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: unit-test-results
          path: reports/unit-tests.xml

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run integration tests
        run: pytest app/tests/integration/ -v --junitxml=reports/integration-tests.xml

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: integration-test-results
          path: reports/integration-tests.xml

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (validation only)
        run: |
          docker build -f docker/Dockerfile \
            -t ${{ env.APP_NAME }}:pr-${{ github.event.number }} .
          echo "Docker build successful for PR #${{ github.event.number }}"
